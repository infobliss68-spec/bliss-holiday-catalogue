backend:
  name: git-gateway
  branch: main

media_folder: "assets/excursions"
public_folder: "/assets/excursions"

site_url: https://bliss-holiday-catalogue.netlify.app
display_url: https://bliss-holiday-catalogue.netlify.app
logo_url: /logo.png

locale: 'en'

collections:
  - name: "excursions"
    label: "Excursions"
    label_singular: "Excursion"
    folder: "data/excursions"
    extension: "json"
    format: "json"
    create: true
    slug: "{{id}}"
    identifier_field: name
    summary: "{{cat}} · {{name}}"
    sortable_fields: ['cat', 'name']
    view_groups:
      - label: By Category
        field: cat
    fields:
      - label: "Excursion ID"
        name: "id"
        widget: "string"
        hint: "Unique short ID like 'south1' or 'cata' — used in filenames (no spaces)"

      - label: "Category"
        name: "cat"
        widget: "select"
        options:
          - { label: "🌿 Land Activities", value: "land" }
          - { label: "🌊 Sea Activities", value: "sea" }
          - { label: "✈️ Air Experiences", value: "air" }

      - label: "Icon"
        name: "icon"
        widget: "select"
        options:
          - { label: "Mountain", value: "i-mountain" }
          - { label: "Wave", value: "i-wave" }
          - { label: "Plane", value: "i-plane" }
          - { label: "Map / Location", value: "i-map" }
          - { label: "Compass / Adventure", value: "i-compass" }
          - { label: "Anchor / Boat", value: "i-anchor" }
          - { label: "Award / Premium", value: "i-award" }
          - { label: "Sun / Nature", value: "i-sun" }
          - { label: "Fish / Fishing", value: "i-fish" }
          - { label: "Heart / Wildlife", value: "i-heart" }
          - { label: "Sparkles / Special", value: "i-sparkles" }
        default: "i-mountain"

      - label: "Name"
        name: "name"
        widget: "string"

      - label: "Tag / Badge"
        name: "tag"
        widget: "string"
        hint: "Short tag (e.g., 'Full Day · Iconic')"

      - label: "Subtitle"
        name: "sub"
        widget: "string"

      - label: "Description"
        name: "desc"
        widget: "text"

      - label: "Starting Point"
        name: "startPt"
        widget: "string"
        default: "Your Hotel"

      - label: "Ending Point"
        name: "endPt"
        widget: "string"

      - label: "Itinerary Steps"
        name: "itin"
        widget: "list"
        hint: "Each step of the journey"
        field: { label: "Step", name: "step", widget: "string" }

      - label: "Info Pills"
        name: "pills"
        widget: "list"
        summary: "{{fields.i}} {{fields.t}}"
        fields:
          - label: "Icon"
            name: "i"
            widget: "select"
            options:
              - { label: "Clock (duration)", value: "i-clock" }
              - { label: "Users (participants)", value: "i-users" }
              - { label: "Utensils (food)", value: "i-utensils" }
              - { label: "Ticket (entrance)", value: "i-ticket" }
              - { label: "Bus (transport)", value: "i-bus" }
              - { label: "Wave (snorkelling)", value: "i-wave" }
              - { label: "Heart (wildlife)", value: "i-heart" }
              - { label: "Calendar", value: "i-calendar" }
              - { label: "Award", value: "i-award" }
              - { label: "Sun", value: "i-sun" }
              - { label: "Camera", value: "i-camera" }
              - { label: "Map", value: "i-map" }
              - { label: "Anchor", value: "i-anchor" }
          - { label: "Text", name: "t", widget: "string" }

      - label: "Prices"
        name: "prices"
        widget: "list"
        summary: "{{fields.l}}: {{fields.v}}"
        fields:
          - { label: "Label", name: "l", widget: "string" }
          - { label: "Value", name: "v", widget: "string" }

      - label: "Important Information / Notes"
        name: "notes"
        widget: "text"

      - label: "Background Color"
        name: "bg"
        widget: "select"
        options:
          - { label: "Land (green)", value: "bg-land" }
          - { label: "Sea (blue)", value: "bg-sea" }
          - { label: "Air (purple)", value: "bg-air" }

      - label: "Photos & Videos"
        name: "media"
        widget: "list"
        hint: "Upload photos and videos. First item = HERO (parallax banner)."
        summary: "{{fields.src}}"
        required: false
        fields:
          - label: "File"
            name: "src"
            widget: "file"
          - label: "Type"
            name: "type"
            widget: "select"
            options:
              - { label: "Image", value: "image" }
              - { label: "Video", value: "video" }
            default: "image"
