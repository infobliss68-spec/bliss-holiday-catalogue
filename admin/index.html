<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bliss Holiday — Admin Panel</title>
<link rel="icon" href="/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#f26a21;--orange-light:#fef0e6;--orange-deep:#d84f0a;
  --ink:#1a1a1a;--text:#2a2a2a;--muted:#7a7a7a;--border:#e8e8e8;
  --bg:#fafafa;--success:#1aa555;--danger:#d33;
}
html,body{height:100%;font-family:'Poppins',sans-serif;color:var(--text);background:var(--bg);font-weight:400;-webkit-font-smoothing:antialiased}
img,video{max-width:100%;display:block}
.ic{width:18px;height:18px;stroke-width:1.8;flex-shrink:0}

/* LOGIN SCREEN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:white;border-radius:16px;box-shadow:0 20px 48px rgba(0,0,0,.08);padding:40px;max-width:420px;width:100%;border:1px solid var(--border)}
.login-box>img{height:48px;display:block;margin:0 auto 24px}
.lock-icon{width:60px;height:60px;border-radius:50%;background:var(--orange-light);color:var(--orange);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.lock-icon svg{width:28px;height:28px}
.login-title{font-size:1.2rem;font-weight:700;color:var(--ink);text-align:center;margin-bottom:6px;letter-spacing:-.3px}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}
.field{margin-bottom:14px}
.field label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700;display:block;margin-bottom:7px}
.field input,.field textarea,.field select{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--bg);outline:none;transition:all .15s;color:var(--ink);font-weight:400}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--orange);background:white}
.field textarea{resize:vertical;min-height:80px;font-family:inherit;line-height:1.5}
.pw-error{display:none;background:#fee;border-left:3px solid var(--danger);padding:10px 13px;border-radius:6px;margin-top:8px;font-size:12px;color:var(--danger);font-weight:500;align-items:center;gap:7px}
.pw-error.show{display:flex}
.btn{border:none;padding:10px 16px;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--orange);color:white}
.btn-primary:hover{background:var(--orange-deep)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--border)}
.btn-danger:hover{background:var(--danger);color:white;border-color:var(--danger)}
.btn-success{background:var(--success);color:white}
.btn-lg{padding:13px 24px;font-size:13px;font-weight:600;letter-spacing:.5px;width:100%;justify-content:center}
.btn .ic{width:14px;height:14px}
.help-text{font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:6px}
.help-text a{color:var(--orange);text-decoration:none}
.help-text a:hover{text-decoration:underline}

/* MAIN LAYOUT */
.app{display:none;min-height:100vh;flex-direction:column}
.app.show{display:flex}
.header{background:white;border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
.header img{height:32px}
.header h1{font-size:1rem;font-weight:700;color:var(--ink);letter-spacing:-.2px}
.header .spacer{flex:1}
.saving-badge{display:none;background:var(--orange-light);color:var(--orange-deep);padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;align-items:center;gap:6px}
.saving-badge.show{display:flex}
.saving-badge .spin{width:12px;height:12px;border:2px solid var(--orange);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.tabs{background:white;border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:0;overflow-x:auto}
.tab{background:none;border:none;padding:14px 18px;font-family:inherit;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:7px;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--orange);border-color:var(--orange)}
.tab .ic{width:15px;height:15px}

.main{padding:28px;max-width:1280px;width:100%;margin:0 auto;flex:1}
.panel{display:none}
.panel.active{display:block}

/* DASHBOARD */
.dash-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:14px;flex-wrap:wrap}
.dash-top h2{font-size:1.3rem;font-weight:700;color:var(--ink)}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:6px 13px;border:1px solid var(--border);background:white;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text)}
.filter-chip:hover{border-color:var(--orange)}
.filter-chip.active{background:var(--orange);color:white;border-color:var(--orange)}

.exc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.exc-card{background:white;border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.exc-card:hover{border-color:var(--orange);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.05)}
.exc-card-top{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.exc-card-icon{width:42px;height:42px;border-radius:10px;background:var(--orange-light);color:var(--orange);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.exc-card-icon svg{width:20px;height:20px}
.exc-card-meta{flex:1;min-width:0}
.exc-card-cat{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:2px}
.exc-card-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.exc-card-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border);font-size:12px}
.exc-card-price{color:var(--orange);font-weight:600}
.exc-card-photos{color:var(--muted);display:flex;align-items:center;gap:4px}
.exc-card-photos .ic{width:12px;height:12px}

.add-card{background:transparent;border:2px dashed var(--border);color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;min-height:140px;text-align:center;transition:all .15s;cursor:pointer}
.add-card:hover{border-color:var(--orange);color:var(--orange)}
.add-card .ic{width:28px;height:28px;margin-bottom:8px}
.add-card-text{font-size:12.5px;font-weight:500}

/* EDITOR */
.editor-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:14px;flex-wrap:wrap}
.editor-top-left{display:flex;align-items:center;gap:14px}
.back-btn{background:none;border:none;color:var(--muted);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:6px}
.back-btn:hover{background:white;color:var(--orange)}
.editor-title{font-size:1.2rem;font-weight:700;color:var(--ink)}

.editor-grid{display:grid;grid-template-columns:1fr 360px;gap:20px}
@media(max-width:1000px){.editor-grid{grid-template-columns:1fr}}

.edit-card{background:white;border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:16px}
.edit-card h3{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.edit-card h3 .ic{width:13px;height:13px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* List widget (itinerary, pills, prices) */
.list-widget{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.list-item{display:flex;gap:8px;align-items:center}
.list-item input,.list-item select{flex:1}
.list-item .btn-danger{padding:8px}
.list-item .btn-danger .ic{width:14px;height:14px;margin:0}
.list-item .drag-handle{color:var(--muted);cursor:grab;padding:4px;width:24px;display:flex;justify-content:center}
.add-item-btn{background:var(--bg);border:1px dashed var(--border);color:var(--orange);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;padding:9px 14px;border-radius:8px;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.add-item-btn:hover{border-color:var(--orange);background:var(--orange-light)}
.add-item-btn .ic{width:13px;height:13px}

/* MEDIA UPLOAD */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:28px;text-align:center;cursor:pointer;position:relative;transition:all .2s;background:var(--bg);margin-bottom:12px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--orange);background:var(--orange-light)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-zone .ic{width:32px;height:32px;color:var(--orange);margin-bottom:8px;stroke-width:1.5}
.upload-zone p{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:3px}
.upload-zone small{font-size:11px;color:var(--muted)}
.upload-zone.uploading{pointer-events:none;opacity:.7}
.upload-progress{margin-top:14px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;display:none}
.upload-progress.show{display:block}
.upload-progress .bar{height:100%;background:var(--orange);border-radius:3px;transition:width .3s;width:0}
.upload-hint{background:#fff8ef;border:1px solid #f5d4b5;padding:10px 13px;border-radius:8px;margin-bottom:12px;font-size:12px;color:var(--orange-deep);line-height:1.5}

.media-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.media-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:2px solid transparent;background:#222;cursor:pointer}
.media-item.is-hero{border-color:var(--orange);box-shadow:0 0 0 2px var(--orange-light)}
.media-item img,.media-item video{width:100%;height:100%;object-fit:cover}
.media-hero-badge{position:absolute;top:4px;left:4px;background:var(--orange);color:white;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.media-actions{position:absolute;top:4px;right:4px;display:flex;gap:4px}
.media-btn{width:22px;height:22px;background:rgba(0,0,0,.7);border:none;border-radius:5px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.media-btn:hover{background:var(--orange)}
.media-btn .ic{width:11px;height:11px;stroke-width:2.5}
.media-order{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,.7);color:white;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.media-empty{grid-column:1/-1;text-align:center;padding:30px 10px;color:var(--muted);font-size:12px}

/* SIDEBAR SETTINGS */
.sidebar-settings{position:sticky;top:100px;align-self:start}
.danger-zone{background:#fef5f5;border:1px solid #fcc;border-radius:12px;padding:18px}
.danger-zone h3{color:var(--danger);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.danger-zone p{font-size:12px;color:#833;line-height:1.5;margin-bottom:12px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--success);color:white;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;z-index:1000;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:var(--danger)}
.toast .ic{width:15px;height:15px}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.modal-box{background:white;border-radius:14px;max-width:460px;width:100%;padding:28px;box-shadow:0 20px 48px rgba(0,0,0,.2)}
.modal-box h3{font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:8px}
.modal-box p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

/* SETTINGS PANEL */
.settings-card{background:white;border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px;max-width:680px}
.settings-card h3{font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.settings-card>p{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:16px}
.cred-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:12.5px;font-weight:500}
.cred-status.ok{background:#e8f7ee;color:var(--success)}
.cred-status.missing{background:#fef5f5;color:var(--danger)}
.cred-status .ic{width:15px;height:15px}

/* LOADING */
.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.loading .spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <img src="/logo.png" alt="Bliss Holiday">
    <div class="lock-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1 class="login-title">Admin Access</h1>
    <p class="login-sub">Enter your password to manage the catalogue</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pwInput" placeholder="Password" autofocus onkeydown="if(event.key==='Enter')tryLogin()">
    </div>
    <button class="btn btn-primary btn-lg" onclick="tryLogin()">
      <svg class="ic" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Log in
    </button>
    <div class="pw-error" id="pwError">
      <svg class="ic" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Incorrect password
    </div>
  </div>
</div>

<div class="app" id="app">
  <header class="header">
    <img src="/logo.png" alt="Bliss">
    <h1>Admin Panel</h1>
    <div class="spacer"></div>
    <div class="saving-badge" id="savingBadge"><div class="spin"></div>Saving...</div>
    <a href="/" class="btn btn-ghost">
      <svg class="ic" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      View site
    </a>
    <button class="btn btn-ghost" onclick="logout()">
      <svg class="ic" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </header>

  <nav class="tabs">
    <button class="tab active" onclick="showPanel('dashboard',this)">
      <svg class="ic" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Excursions
    </button>
    <button class="tab" onclick="showPanel('settings',this)">
      <svg class="ic" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </nav>

  <main class="main">
    <div class="panel active" id="p-dashboard">
      <div class="dash-top">
        <h2>Excursions</h2>
        <div class="filters" id="filters">
          <button class="filter-chip active" onclick="filterCat('all',this)">All</button>
          <button class="filter-chip" onclick="filterCat('land',this)">Land</button>
          <button class="filter-chip" onclick="filterCat('sea',this)">Sea</button>
          <button class="filter-chip" onclick="filterCat('air',this)">Air</button>
        </div>
      </div>
      <div id="excGrid" class="exc-grid"></div>
    </div>

    <div class="panel" id="p-editor"></div>
    <div class="panel" id="p-settings"></div>
  </main>
</div>

<div class="modal" id="confirmModal" onclick="if(event.target.id==='confirmModal')closeModal()">
  <div class="modal-box">
    <h3 id="modalTitle">Are you sure?</h3>
    <p id="modalText">This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="modalConfirmBtn" onclick="confirmAction()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <svg class="ic" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastText">Saved</span>
</div>

<script>

// ========== AUTH ==========
async function sha256(text){
  const buf = new TextEncoder().encode(text);
  const hashBuf = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function tryLogin(){
  const input = document.getElementById('pwInput');
  const err = document.getElementById('pwError');
  const hash = await sha256(input.value);
  if(hash === ADMIN_PASSWORD_HASH){
    sessionStorage.setItem('bliss_admin','1');
    showApp();
  } else {
    err.classList.add('show');
    input.value = '';
    input.focus();
    setTimeout(()=>err.classList.remove('show'),3000);
  }
}

function logout(){
  sessionStorage.removeItem('bliss_admin');
  location.reload();
}

// ========== MEDIA ==========
async function handleFileUpload(ev){
  if(!cloudinaryCloud || !cloudinaryPreset){
    toast('Configure Cloudinary in Settings first','error');
    return;
  }
  const files = Array.from(ev.target.files);
  if(!files.length)return;

  const zone = document.getElementById('uploadZone');
  const progress = document.getElementById('uploadProgress');
  const bar = document.getElementById('uploadBar');
  zone.classList.add('uploading');
  progress.classList.add('show');

  let done = 0;
  for(const f of files){
    try {
      const url = await uploadToCloudinary(f, p=>{
        const tot = (done + p/100) / files.length * 100;
        bar.style.width = tot + '%';
      });
      if(!currentExc.media) currentExc.media = [];
      const isVid = f.type.startsWith('video');
      currentExc.media.push({type:isVid?'video':'image', src:url});
      done++;
    } catch(e){
      console.error(e);
      toast('Upload failed: '+e.message,'error');
    }
  }

  bar.style.width = '100%';
  setTimeout(()=>{
    zone.classList.remove('uploading');
    progress.classList.remove('show');
    bar.style.width = '0';
    renderEditor();
    toast(`${done} file${done!==1?'s':''} uploaded`);
  }, 300);
  ev.target.value = '';
}

function uploadToCloudinary(file, onProgress){
  return new Promise((resolve,reject)=>{
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', cloudinaryPreset);

    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = e=>{
      if(e.lengthComputable && onProgress) onProgress(e.loaded/e.total*100);
    };
    xhr.onload = ()=>{
      if(xhr.status===200){
        const data = JSON.parse(xhr.responseText);
        resolve(data.secure_url);
      } else {
        reject(new Error('Upload failed: '+xhr.status));
      }
    };
    xhr.onerror = ()=>reject(new Error('Network error'));
    const isVid = file.type.startsWith('video');
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${cloudinaryCloud}/${isVid?'video':'image'}/upload`);
    xhr.send(fd);
  });
}

function setHero(i){
  if(i===0) return;

async function saveExcursion(){
  if(!githubToken || !githubRepo){
    toast('Configure GitHub token & repo in Settings first','error');
    showPanel('settings');
    return;
  }
  const badge = document.getElementById('savingBadge');
  badge.classList.add('show');
  try {
    const data = {...currentExc};
    delete data._originalId;
    delete data._isNew;

    const path = `data/excursions/${data.id}.json`;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));

    console.log('[Bliss Admin] Saving to:', `https://api.github.com/repos/${githubRepo}/contents/${path}`);
    console.log('[Bliss Admin] Repo:', githubRepo, '| Token prefix:', githubToken.substring(0,10)+'...');

    let sha = null;
    if(!currentExc._isNew){
      try {
        const r = await fetch(`https://api.github.com/repos/${githubRepo}/contents/${path}`,{
          headers:{'Authorization':'Bearer '+githubToken,'Accept':'application/vnd.github+json'}
        });
        console.log('[Bliss Admin] GET existing file status:', r.status);
        if(r.ok){
          const existing = await r.json();
          sha = existing.sha;
          console.log('[Bliss Admin] Got SHA:', sha);

        } else {

          throw new Error(`GitHub check failed (${r.status}): ${errData.message||'Unknown'}`);
        }
      } catch(e){
        console.error('[Bliss Admin] Error checking existing file:', e);
        throw e;
      }
    }

    if(!currentExc._isNew && currentExc._originalId && currentExc._originalId !== data.id){
      await deleteFromGitHub(`data/excursions/${currentExc._originalId}.json`);
    }

    const body = {
      message: `Update excursion: ${data.name}`,
      content: content
    };
    if(sha) body.sha = sha;

    console.log('[Bliss Admin] Sending PUT with body:', {message:body.message, hasSha: !!sha});

    const r = await fetch(`https://api.github.com/repos/${githubRepo}/contents/${path}`,{
      method:'PUT',
      headers:{'Authorization':'Bearer '+githubToken,'Content-Type':'application/json','Accept':'application/vnd.github+json'},
      body:JSON.stringify(body)
    });

    const respData = await r.json();
    console.log('[Bliss Admin] PUT response status:', r.status, respData);

    if(!r.ok){
      throw new Error(`GitHub rejected save (${r.status}): ${respData.message||'Unknown error'}`);
    }

    toast('Saved! Site rebuilding (~1 min)...');
    await loadExcursions();
    setTimeout(()=>backToDashboard(),1200);
  } catch(e){
    console.error('[Bliss Admin] Save error:', e);
    toast('Save failed: '+e.message,'error');
  } finally {
    badge.classList.remove('show');
  }
}

async function deleteFromGitHub(path){
  try {
    const r = await fetch(`https://api.github.com/repos/${githubRepo}/contents/${path}`,{
      headers:{Authorization:'Bearer '+githubToken}
    });
    if(r.ok){
      const data = await r.json();
      await fetch(`https://api.github.com/repos/${githubRepo}/contents/${path}`,{
        method:'DELETE',
        headers:{'Authorization':'Bearer '+githubToken,'Content-Type':'application/json'},
        body:JSON.stringify({message:`Delete ${path}`, sha:data.sha})
      });
    }
  } catch(e){console.error(e);}
}

function deleteExcursion(){
  pendingAction = async ()=>{
    const badge = document.getElementById('savingBadge');
    badge.classList.add('show');
    try {
      await deleteFromGitHub(`data/excursions/${currentExc._originalId}.json`);
      toast('Excursion deleted');
      await loadExcursions();
      backToDashboard();
    } catch(e){
      toast('Delete failed: '+e.message,'error');
    } finally {
      badge.classList.remove('show');
    }
  };
  openModal('Delete this excursion?',`"${currentExc.name}" will be permanently removed. This cannot be undone.`,'Delete');
}

function backToDashboard(){
  currentExc = null;
  showPanel('dashboard');
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));
}

async function runFullDiagnostic(){
  const result = document.getElementById('diagnosticResult');
  const repo = document.getElementById('s-repo')?.value.trim();
  const token = document.getElementById('s-token')?.value.trim();
  const cloud = document.getElementById('s-cloud')?.value.trim();
  const preset = document.getElementById('s-preset')?.value.trim();

  const tests = [];
  let critical = 0;
  let warnings = 0;

  result.innerHTML = `<div style="color:var(--muted);padding:16px;background:var(--bg);border-radius:10px;display:flex;align-items:center;gap:10px">
    <div style="width:16px;height:16px;border:2px solid var(--orange);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite"></div>
    Running diagnostic tests... this takes a few seconds
  </div>`;

  // ========== GITHUB TESTS ==========
  tests.push({section:'github', title:'🐙 GITHUB'});

  if(!repo){
    tests.push({status:'fail',label:'Repository configured',detail:'Empty — enter your repo below',critical:true});
    critical++;
  } else if(!/^[\w-]+\/[\w.-]+$/.test(repo)){
    tests.push({status:'fail',label:'Repository format',detail:`"${repo}" is not valid. Expected format: "username/repo-name" (e.g., infobliss68-spec/bliss-holiday-catalogue)`,critical:true});
    critical++;
  } else {
    tests.push({status:'ok',label:'Repository format',detail:repo});
  }

  if(!token){
    tests.push({status:'fail',label:'Token configured',detail:'Empty — enter your GitHub token below',critical:true});
    critical++;
  } else if(!token.match(/^(ghp_|github_pat_|gho_)/)){
    tests.push({status:'warn',label:'Token format',detail:`Token should start with "ghp_" or "github_pat_". Yours starts with "${token.substring(0,6)}..."`});
    warnings++;
  } else {
    tests.push({status:'ok',label:'Token format',detail:`${token.substring(0,10)}... (${token.length} chars)`});
  }

  // Test GitHub API access
  let defaultBranch = null;
  if(repo && token && critical === 0){
    try {
      const r = await fetch(`https://api.github.com/repos/${repo}`,{
        headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json'}
      });
      if(r.status === 401){
        tests.push({status:'fail',label:'GitHub authentication',detail:'Token is invalid or expired. Create a new token at github.com/settings/tokens',critical:true});
        critical++;
      } else if(r.status === 404){
        tests.push({status:'fail',label:'Repository access',detail:`Repo "${repo}" not found OR your token doesn't have access to it. Verify the repo name is correct.`,critical:true});
        critical++;
      } else if(!r.ok){
        const err = await r.json();
        tests.push({status:'fail',label:'GitHub API',detail:`Error ${r.status}: ${err.message||'Unknown'}`,critical:true});
        critical++;
      } else {
        const data = await r.json();
        defaultBranch = data.default_branch;
        tests.push({status:'ok',label:'GitHub authentication',detail:`Authenticated as owner of "${data.full_name}"`});
        tests.push({status:'ok',label:'Default branch',detail:defaultBranch});

        // Check token scopes
        const scopes = r.headers.get('X-OAuth-Scopes') || r.headers.get('x-oauth-scopes') || '';
        if(scopes){
          if(scopes.includes('repo')){
            tests.push({status:'ok',label:'Token scopes',detail:scopes});
          } else {
            tests.push({status:'fail',label:'Token scopes',detail:`Missing "repo" scope. Current: "${scopes}". Re-create token with "repo" checked.`,critical:true});
            critical++;
          }
        } else {
          tests.push({status:'warn',label:'Token scopes',detail:'Could not verify scopes (fine-grained tokens don\'t expose this)'});
        }

        if(defaultBranch && defaultBranch !== 'main'){
          tests.push({status:'warn',label:'Branch mismatch',detail:`Repo branch is "${defaultBranch}" but admin commits to "main". Netlify might not rebuild.`});
          warnings++;
        }
      }
    } catch(e){
      tests.push({status:'fail',label:'GitHub network',detail:e.message,critical:true});
      critical++;
    }
  }

  // Test data/excursions folder access
  if(repo && token && critical === 0){
    try {
      const r = await fetch(`https://api.github.com/repos/${repo}/contents/data/excursions`,{
        headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json'}
      });
      if(r.ok){
        const files = await r.json();
        const jsonFiles = files.filter(f=>f.name.endsWith('.json'));
        tests.push({status:'ok',label:'data/excursions folder',detail:`Found ${files.length} items (${jsonFiles.length} JSON files)`});

        // Read a sample file to verify
        if(jsonFiles.length > 0){
          const sample = jsonFiles[0];
          const r2 = await fetch(sample.download_url);
          if(r2.ok){
            const json = await r2.json();
            tests.push({status:'ok',label:'Read sample file',detail:`${sample.name}: "${json.name}" — ${json.prices?.[0]?.v||'no price'}`});
          }
        }
      } else if(r.status === 404){
        tests.push({status:'fail',label:'data/excursions folder',detail:'Folder not found at /data/excursions. Check your repo structure.',critical:true});
        critical++;
      } else {
        tests.push({status:'warn',label:'data/excursions folder',detail:`Status ${r.status}`});
        warnings++;
      }
    } catch(e){
      tests.push({status:'warn',label:'data/excursions check',detail:e.message});
      warnings++;
    }
  }

  // Test WRITE permission (actual save test — create then delete a test file)
  if(repo && token && critical === 0){
    try {
      const testPath = `.bliss-admin-test-${Date.now()}.txt`;
      const testContent = btoa('Bliss Admin Connection Test');

      const r = await fetch(`https://api.github.com/repos/${repo}/contents/${testPath}`,{
        method:'PUT',
        headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json','Accept':'application/vnd.github+json'},
        body:JSON.stringify({message:'Bliss Admin: connection test (safe to ignore)',content:testContent})
      });

      if(r.ok){
        const created = await r.json();
        tests.push({status:'ok',label:'Write permission',detail:'Successfully created test file'});

        // Clean up the test file
        try {
          await fetch(`https://api.github.com/repos/${repo}/contents/${testPath}`,{
            method:'DELETE',
            headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json','Accept':'application/vnd.github+json'},
            body:JSON.stringify({message:'Bliss Admin: cleanup test file',sha:created.content.sha})
          });
          tests.push({status:'ok',label:'Delete permission',detail:'Successfully deleted test file'});
        } catch(e){
          tests.push({status:'warn',label:'Delete permission',detail:'Could not cleanup test file (not critical)'});
        }
      } else {
        const err = await r.json();
        tests.push({status:'fail',label:'Write permission',detail:`Cannot write: ${err.message||'Error '+r.status}`,critical:true});
        critical++;
      }
    } catch(e){
      tests.push({status:'fail',label:'Write permission',detail:e.message,critical:true});
      critical++;
    }
  }

  // ========== CLOUDINARY TESTS ==========
  tests.push({section:'cloudinary', title:'☁️ CLOUDINARY'});

  if(!cloud){
    tests.push({status:'warn',label:'Cloud name configured',detail:'Empty — photo uploads will not work'});
    warnings++;
  } else if(!/^[\w-]+$/.test(cloud)){
    tests.push({status:'warn',label:'Cloud name format',detail:`"${cloud}" contains invalid characters`});
    warnings++;
  } else {
    tests.push({status:'ok',label:'Cloud name',detail:cloud});
  }

  if(!preset){
    tests.push({status:'warn',label:'Upload preset configured',detail:'Empty — photo uploads will not work'});
    warnings++;
  } else {
    tests.push({status:'ok',label:'Upload preset',detail:preset});
  }

  // Test Cloudinary with a real tiny upload
  if(cloud && preset){
    try {
      // Create a 1x1 pixel test PNG
      const pngBlob = await (async()=>{
        const canvas = document.createElement('canvas');
        canvas.width = 1; canvas.height = 1;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#f26a21';
        ctx.fillRect(0,0,1,1);
        return new Promise(r=>canvas.toBlob(r,'image/png'));
      })();

      const fd = new FormData();
      fd.append('file', pngBlob, 'bliss-test.png');
      fd.append('upload_preset', preset);

      const r = await fetch(`https://api.cloudinary.com/v1_1/${cloud}/image/upload`,{
        method:'POST',
        body: fd
      });

      if(r.ok){
        const data = await r.json();
        tests.push({status:'ok',label:'Cloudinary upload',detail:`Uploaded successfully. URL: ${data.secure_url.substring(0,50)}...`});
      } else {
        const err = await r.json().catch(()=>({error:{message:'Unknown'}}));
        const msg = err.error?.message || `Status ${r.status}`;
        if(msg.toLowerCase().includes('unsigned') || msg.toLowerCase().includes('preset')){
          tests.push({status:'fail',label:'Cloudinary upload',detail:`${msg}. Go to Cloudinary → Settings → Upload → Upload presets → Edit "${preset}" → Set "Signing mode" to UNSIGNED.`,critical:true});
        } else if(r.status === 401){
          tests.push({status:'fail',label:'Cloudinary auth',detail:`Cloud name "${cloud}" or preset "${preset}" is incorrect.`,critical:true});
        } else {
          tests.push({status:'fail',label:'Cloudinary upload',detail:msg,critical:true});
        }
        critical++;
      }
    } catch(e){
      tests.push({status:'fail',label:'Cloudinary upload',detail:e.message,critical:true});
      critical++;
    }
  }

  // ========== RENDER RESULTS ==========
  const statusIcons = {
    ok: '<span style="color:var(--success);font-weight:700">✓</span>',
    fail: '<span style="color:var(--danger);font-weight:700">✗</span>',
    warn: '<span style="color:var(--orange);font-weight:700">⚠</span>'
  };
  const statusColors = {
    ok: '#e8f7ee',
    fail: '#fee',
    warn: '#fff8ef'
  };
  const statusBorders = {
    ok: 'var(--success)',
    fail: 'var(--danger)',
    warn: 'var(--orange)'
  };

  let html = '';

  // Summary banner
  if(critical > 0){
    html += `<div style="padding:16px 20px;background:#fee;border-left:4px solid var(--danger);border-radius:8px;margin-bottom:16px">
      <div style="font-weight:700;color:var(--danger);font-size:14px;margin-bottom:4px">❌ ${critical} critical issue${critical>1?'s':''} — saves will fail</div>
      <div style="font-size:12.5px;color:#833;line-height:1.6">Fix the red items below, then run the diagnostic again.</div>
    </div>`;
  } else if(warnings > 0){
    html += `<div style="padding:16px 20px;background:#fff8ef;border-left:4px solid var(--orange);border-radius:8px;margin-bottom:16px">
      <div style="font-weight:700;color:var(--orange-deep);font-size:14px;margin-bottom:4px">⚠️ ${warnings} warning${warnings>1?'s':''} — some features may not work perfectly</div>
      <div style="font-size:12.5px;color:var(--orange-deep);line-height:1.6">Critical features work, but review the warnings below.</div>
    </div>`;
  } else {
    html += `<div style="padding:16px 20px;background:#e8f7ee;border-left:4px solid var(--success);border-radius:8px;margin-bottom:16px">
      <div style="font-weight:700;color:var(--success);font-size:14px;margin-bottom:4px">✅ All systems working!</div>
      <div style="font-size:12.5px;color:#155;line-height:1.6">You can now save excursions and upload photos.</div>
    </div>`;
  }

  // Test details
  html += '<div style="background:white;border:1px solid var(--border);border-radius:10px;overflow:hidden">';
  tests.forEach(t=>{
    if(t.section){
      html += `<div style="background:var(--bg);padding:10px 16px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)">${t.title}</div>`;
    } else {
      html += `<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start">
        <div style="width:20px;text-align:center;padding-top:2px">${statusIcons[t.status]}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px">${t.label}</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.5;word-break:break-word">${t.detail}</div>
        </div>
      </div>`;
    }
  });
  html += '</div>';

  result.innerHTML = html;
}

async function generateNewHash(){
  const v = document.getElementById('s-newpw').value.trim();
  if(!v || v.length<6){ toast('Password must be at least 6 characters','error'); return; }
  const h = await sha256(v);
  document.getElementById('newHashValue').textContent = h;
  document.getElementById('newHashResult').style.display = 'block';
  document.getElementById('s-newpw').value = '';
}

function copyHashToClipboard(){
  const h = document.getElementById('newHashValue').textContent;
  navigator.clipboard.writeText(h).then(()=>toast('Hash copied — paste it in admin/index.html'));
}

// ========== UI HELPERS ==========
function showPanel(name, tabBtn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+name).classList.add('active');
  if(tabBtn){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tabBtn.classList.add('active');
  }
  if(name==='settings') renderSettingsPanel();
  if(name==='dashboard') renderDashboard();
}

function toast(msg, type){
  const t = document.getElementById('toast');
  const txt = document.getElementById('toastText');
  txt.textContent = msg;
  t.classList.toggle('error', type==='error');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function openModal(title, text, confirmLabel){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalText').textContent = text;
  document.getElementById('modalConfirmBtn').textContent = confirmLabel || 'Confirm';
  document.getElementById('confirmModal').classList.add('open');
}
function closeModal(){
  document.getElementById('confirmModal').classList.remove('open');
  pendingAction = null;
}
function confirmAction(){
  if(pendingAction) pendingAction();
  closeModal();
}

// Auto-login if session exists
if(sessionStorage.getItem('bliss_admin')==='1'){
  showApp();
}
